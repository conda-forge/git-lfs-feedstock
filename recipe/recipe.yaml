# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.7.1"

package:
  name: git-lfs
  version: ${{ version }}

source:
  - url: https://github.com/git-lfs/git-lfs/archive/v${{ version }}.tar.gz
    sha256: 0e83566a9e2477e03627e7fd6bf81f01fadbf93dcaf6abd2686fca90f6bac7dd
    target_directory: github.com/git-lfs/git-lfs

build:
  number: 1
  script:
    env:
      GOFLAGS: -buildmode=pie -trimpath -ldflags=-linkmode=external -mod=vendor -modcacherw
    content:
    - ${{ 'set -x' if unix else '@echo on' }}
    - cd github.com/git-lfs/git-lfs
    - ${{ 'GOARCH=amd64 ' if osx and arm64 }}go generate ./commands
    - go build -v -ldflags "-w -s" ${{ '.' if (build_platform != target_platform) else '-o $PREFIX/bin/git-lfs' }}
    - if: build_platform == target_platform and not win
      then:
        - go install -v -ldflags "-w -s" .
    - if: win
      then:
        - go build -v -ldflags "-w -s" -o "%PREFIX%\Library\bin\git-lfs.exe"
    - go-licenses save . --save_path=${{ SRC_DIR }}/license_files || true

requirements:
  build:
    - ${{ compiler('go') }}
    - go-licenses

tests:
  - requirements:
      run:
        - if: unix
          then: git
    script:
      - git-lfs --help
      - if: win
        then:
          - where git-lfs
          - echo "%Path%"
      - git-lfs --version

about:
  license: MIT
  license_file:
    - github.com/git-lfs/git-lfs/LICENSE.md
    - license_files/
  summary: An open source Git extension for versioning large files
  homepage: https://git-lfs.github.com/
  repository: https://github.com/git-lfs/git-lfs

extra:
  recipe-maintainers:
    - dfroger
    - willirath
    - dbast
